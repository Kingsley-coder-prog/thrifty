services:
  postgres:
    image: postgres:16-alpine
    container_name: thrifty_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: thrifty_app
      POSTGRES_PASSWORD: thrifty_dev_password
      POSTGRES_DB: thrifty_dev
    ports:
      - "5433:5432"
    volumes:
      - thrifty_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U thrifty_app -d thrifty_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: thrifty_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - thrifty_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  thrifty_postgres_data:
  thrifty_redis_data: