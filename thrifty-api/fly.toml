# fly.toml - Thrifty Worker Configuration
# Documentation: https://fly.io/docs/reference/configuration/
# This file is used to configure the deployment of the Thrifty Worker on Fly.io. It specifies the application name, primary region, build settings, environment variables, processes, and virtual machine resources.

app = "thrifty-worker"
primary_region = "fra"

[build]

[env]
NODE_ENV = "production"

[processes]
worker = "npm run worker:prod"

[[vm]]
memory = "256mb"
cpu_kind = "shared"
cpus = 1
